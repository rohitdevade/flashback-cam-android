plugins {
    id "com.android.application"
    id "com.google.gms.google-services"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}


def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.rochapps.flashbackcam"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    signingConfigs {
       release {
           keyAlias keystoreProperties['keyAlias']
           keyPassword keystoreProperties['keyPassword']
           storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
           storePassword keystoreProperties['storePassword']
       }
    }

    defaultConfig {
        applicationId = "com.rochapps.flashbackcam"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    lint {
        disable 'NullSafeMutableLiveData'
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.1'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.1'
    implementation "androidx.camera:camera-core:1.5.0"
    implementation "androidx.camera:camera-camera2:1.5.0"
    implementation "androidx.camera:camera-lifecycle:1.5.0"
    implementation "androidx.camera:camera-video:1.5.0"
    implementation "androidx.camera:camera-view:1.5.0"
    implementation "androidx.camera:camera-extensions:1.5.0"
    implementation "androidx.concurrent:concurrent-futures:1.2.0"
    implementation "com.google.guava:guava:33.4.0-android"
    // Required for WindowCompat edge-to-edge - Android 15 compatibility
    implementation "androidx.core:core-ktx:1.15.0"
    // Force compatible versions for AGP 8.7.2
    implementation "androidx.core:core:1.15.0"
    implementation "androidx.browser:browser:1.8.0"
    
    // ═══════════════════════════════════════════════════════════════════════════════
    // COLD START: Android 12+ SplashScreen API
    // Uses the new SplashScreen API for faster, smoother cold start
    // ═══════════════════════════════════════════════════════════════════════════════
    implementation "androidx.core:core-splashscreen:1.0.1"
}

configurations.all {
    resolutionStrategy {
        // Force compatible AndroidX versions for AGP 8.7.2
        force 'androidx.core:core-ktx:1.15.0'
        force 'androidx.core:core:1.15.0'
        force 'androidx.browser:browser:1.8.0'
    }
}
