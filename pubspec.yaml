
name: flashback_cam
description: "Capture every moment, even the ones you almost missed, with Flashback Cam – the innovative pre-roll camera app that ensures you never lose a memory!"
publish_to: "none"
version: 1.0.32+40

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  shared_preferences: ^2.5.4
  path_provider: ^2.0.0
  video_player: '>=2.9.2'
  provider: ^6.0.0
  intl: ^0.20.2
  share_plus: ^12.0.1
  permission_handler: ^12.0.1
  path: ^1.9.0
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+8
  # Google Mobile Ads SDK 7.0.0 - Android 15 edge-to-edge compliant
  # Contains fixes for deprecated setStatusBarColor/setNavigationBarColor APIs
  google_mobile_ads: ^7.0.0
  wakelock_plus: ^1.2.8
  url_launcher: ^6.3.1
  in_app_review: ^2.0.9
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/flashback_cam_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/flashback_cam_icon.png
